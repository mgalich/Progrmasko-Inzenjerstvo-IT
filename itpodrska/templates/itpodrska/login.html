<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <title>ITFlow - prijava</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0f2742;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            background: white;
            width: 420px;
            padding: 40px;
            border-radius: 18px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.25);
        }

        h1 {
            margin-top: 0;
            color: #0f2742;
            text-align: center;
        }

        h2 {
            color: #1f2937;
            text-align: center;
            margin-bottom: 30px;
        }

        label {
            font-weight: bold;
            display: block;
            margin-top: 15px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-top: 8px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            margin-top: 25px;
            padding: 12px;
            background: #0f2742;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #1e4268;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <h1>ITFlow</h1>
        <h2>Prijava u sustav</h2>

        <form method="post">
            {% csrf_token %}

            <label>Korisničko ime</label>
            {{ form.username }}

            <label>Lozinka</label>
            {{ form.password }}

            <button type="submit">Prijavi se</button>
        </form>
    </div>

</body>
</html>
